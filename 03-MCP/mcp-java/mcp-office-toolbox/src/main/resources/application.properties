# MCP Office Toolbox 服务器配置
# 禁用 Web 应用模式，使用 STDIO 传输
spring.main.web-application-type = none

# STDIO 传输模式下必须禁用 banner 和控制台日志输出
spring.main.banner-mode = off
logging.pattern.console =

# MCP 服务器元信息
spring.ai.mcp.server.name = mcp-office-toolbox
spring.ai.mcp.server.version = 1.0.0

# ==================== 日志配置 ====================
# 日志目录路径（可选，默认自动解析为项目根目录下的 logs/）
# logging.dir = /var/log/mcp-office-toolbox

# ==================== PDF 字体配置 ====================
# 自定义中文字体文件路径，逗号分隔（可选，不配置则使用内置跨平台默认路径）
# 示例: pdf.chinese-font-paths = /usr/share/fonts/myfont.ttf,/opt/fonts/NotoSansCJK.ttc
# pdf.chinese-font-paths =

# ==================== 临时文件目录 ====================
# 临时文件目录（可选，默认使用系统临时目录）
# temp.dir = /tmp/mcp-office-toolbox

# ==================== HTTP 抓取配置 ====================
# HTTP 请求 User-Agent
fetch.user-agent = Mozilla/5.0 (compatible; MCP-Fetch-Java/1.0)
# HTTP 请求超时时间（秒）
fetch.timeout-seconds = 30

# ==================== 命令执行配置 ====================
# 命令执行默认超时时间（秒）
command.default-timeout = 30

# ==================== HTTP 客户端配置 ====================
# HTTP 请求默认超时时间（秒），所有 http_* 工具的默认值
http.timeout-seconds = 30

