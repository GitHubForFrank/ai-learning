# [SDD-TASK: Task001]
# [SDD-SPEC: 03-技术方案.md §9]

# ----- Server -----
server.port=10197
server.servlet.context-path=/app
server.tomcat.uri-encoding=UTF-8

# ----- Logback -----
logging.config=classpath:logback-config.xml
logging.level.root=info
logging.level.com.zmz.sdd.fullstack=debug
logging.file.name=workitem-backend
logging.file.path=../logs/app

# ----- Datasource -----
spring.datasource.url=jdbc:mysql://localhost:3306/zmz_sdd_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:NewPassword123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.pool-name=workitem-backend-pool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# ----- Flyway (loads migration scripts from external workitem-db repo) -----
spring.flyway.enabled=true
spring.flyway.locations=filesystem:../workitem-db/migration
spring.flyway.baseline-on-migrate=false

# ----- MyBatis Plus -----
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.cache-enabled=false

# ----- JWT (HS256 + 1h) -----
auth.jwt.secret=${JWT_SECRET:dev-only-secret-please-rotate-256-bits-zmz-sdd-demo-workitem001}
auth.jwt.expires-seconds=3600
auth.jwt.algorithm=HS256

# ----- Lockout -----
auth.lockout.max-failures=3
auth.lockout.duration-minutes=15

# ----- CORS -----
auth.cors.allowed-origins=http://localhost:5173

# ----- SpringDoc -----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ----- Default Admin (Task001 V4 seed) -----
auth.default-admin.username=admin
auth.default-admin.password=12346#@&
